# Reusable Workflows see: https://github.com/entur/gha-security/blob/main/README-code-scan.md

name: CodeQL Scan

on:
  pull_request:
    branches:
      - "master"
      - "5.x"
  push:
    branches:
      - "master"
      - "5.x"
  schedule:
    - cron: "0 3 * * MON" # Run Monday at 3AM UTC

jobs:
  code-scan:
    name: CodeQL Scan
    uses: entur/gha-security/.github/workflows/code-scan.yml@v2.11.0
    # no secrets necessary
    permissions: # some of these only apply when running on the main branch
      actions: read
      contents: write
      pull-requests: write
      security-events: write
      issues: write
    with:
      use_setup_java: true
      use_maven_cache: true
      java_version: "25"
